# =============================================================================
# xB Matrix — Worker Cloud Run service definition
# Cloud Tasks pushes HTTP requests to this service. minScale=0 ok; tasks tolerate
# cold starts. maxScale=10 prevents fan-out under spike traffic.
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: xb-worker
  labels:
    app: xb-matrix
    component: worker
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cloudsql-instances: ${CLOUD_SQL_CONNECTION_NAME}
        # VPC connector — see note in api.service.yaml. Add when Redis is wired.
        #   run.googleapis.com/vpc-access-connector: ${VPC_CONNECTOR}
        #   run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: ${RUNTIME_SERVICE_ACCOUNT}
      containerConcurrency: 10
      timeoutSeconds: 600
      containers:
        - image: ${ARTIFACT_REGISTRY}/xb-worker:${IMAGE_TAG}
          ports:
            - name: http1
              containerPort: 4100
          env:
            - name: NODE_ENV
              value: production
            - name: WORKER_PORT
              value: '4100'
            - name: WORKER_HOST
              value: '0.0.0.0'
            - name: BIGQUERY_DATASET
              value: xbmatrixbq
            - name: GCP_PROJECT_ID
              value: ${GCP_PROJECT_ID}
            - name: GCP_REGION
              value: ${GCP_REGION}
            - name: GCS_UPLOADS_BUCKET
              value: ${GCS_UPLOADS_BUCKET}
            - name: GCS_REPORTS_BUCKET
              value: ${GCS_REPORTS_BUCKET}
            - name: CLOUD_TASKS_QUEUE
              value: ${CLOUD_TASKS_QUEUE}
            - name: CLOUD_TASKS_LOCATION
              value: ${CLOUD_TASKS_LOCATION}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: api-redis-url
                  key: latest
          resources:
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health/ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
            periodSeconds: 60
            timeoutSeconds: 3
  traffic:
    - percent: 100
      latestRevision: true
