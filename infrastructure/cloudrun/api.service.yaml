# =============================================================================
# xB Matrix — API Cloud Run service definition
# Apply with:
#   gcloud run services replace infrastructure/cloudrun/api.service.yaml \
#     --region=$GCP_REGION --project=$GCP_PROJECT_ID
#
# Replace ${...} placeholders via envsubst or sed in the deploy workflow.
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: xb-api
  labels:
    app: xb-matrix
    component: api
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '20'
        run.googleapis.com/cpu-throttling: 'true'
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cloudsql-instances: ${CLOUD_SQL_CONNECTION_NAME}
        # VPC connector (required only when reaching private Memorystore Redis at
        # 10.7.249.43). Add back when vpcaccess.googleapis.com is enabled and a
        # connector exists:
        #   run.googleapis.com/vpc-access-connector: ${VPC_CONNECTOR}
        #   run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: ${RUNTIME_SERVICE_ACCOUNT}
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: ${ARTIFACT_REGISTRY}/xb-api:${IMAGE_TAG}
          ports:
            - name: http1
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: '4000'
            - name: API_HOST
              value: '0.0.0.0'
            - name: BIGQUERY_DATASET
              value: xbmatrixbq
            - name: GCP_PROJECT_ID
              value: ${GCP_PROJECT_ID}
            - name: GCP_REGION
              value: ${GCP_REGION}
            - name: GCS_UPLOADS_BUCKET
              value: ${GCS_UPLOADS_BUCKET}
            - name: GCS_REPORTS_BUCKET
              value: ${GCS_REPORTS_BUCKET}
            - name: CLOUD_TASKS_QUEUE
              value: ${CLOUD_TASKS_QUEUE}
            - name: CLOUD_TASKS_LOCATION
              value: ${CLOUD_TASKS_LOCATION}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: api-redis-url
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-jwt-secret
                  key: latest
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-groq-api-key
                  key: latest
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-openrouter-api-key
                  key: latest
                  optional: true
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
            periodSeconds: 30
            timeoutSeconds: 3
  traffic:
    - percent: 100
      latestRevision: true
