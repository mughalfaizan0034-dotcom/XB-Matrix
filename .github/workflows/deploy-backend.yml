name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'packages/auth/**'
      - 'packages/calculations/**'
      - 'packages/ai/**'
      - 'packages/config/**'
      - 'packages/types/**'
      - 'sql/**'
      - 'infrastructure/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-deploy
  cancel-in-progress: false

env:
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
  AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-api:${{ steps.tag.outputs.tag }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-api:latest

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: true
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-worker:${{ steps.tag.outputs.tag }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-worker:latest

      - name: Render Cloud Run service definitions
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          ARTIFACT_REGISTRY: ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}
          GCS_UPLOADS_BUCKET: ${{ vars.GCS_UPLOADS_BUCKET }}
          GCS_REPORTS_BUCKET: ${{ vars.GCS_REPORTS_BUCKET }}
          CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE }}
          CLOUD_TASKS_LOCATION: ${{ vars.CLOUD_TASKS_LOCATION }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
          VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR }}
        run: |
          mkdir -p .rendered
          envsubst < infrastructure/cloudrun/api.service.yaml    > .rendered/api.service.yaml
          envsubst < infrastructure/cloudrun/worker.service.yaml > .rendered/worker.service.yaml

      - name: Deploy API to Cloud Run
        run: |
          gcloud run services replace .rendered/api.service.yaml \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run services replace .rendered/worker.service.yaml \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Summarize
        run: |
          echo "✓ Deployed xb-api and xb-worker @ ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
