name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'packages/auth/**'
      - 'packages/calculations/**'
      - 'packages/ai/**'
      - 'packages/config/**'
      - 'packages/types/**'
      - 'sql/**'
      - 'infrastructure/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-deploy
  cancel-in-progress: false

env:
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
  AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-api:${{ steps.tag.outputs.tag }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-api:latest

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: true
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-worker:${{ steps.tag.outputs.tag }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/xb-worker:latest

      # ---------------------------------------------------------------
      # Apply pending SQL migrations before the new revision goes live.
      #
      # Why before deploy: a deploy of code that depends on a missing
      # schema would crash on startup. By gating the deploy on migrations
      # succeeding, the worst case is a failed workflow rather than a
      # broken production revision.
      #
      # How: pull the api-database-url secret, derive a localhost DSN,
      # tunnel via Cloud SQL Auth Proxy (TCP mode), run
      # `pnpm --filter @xb/api db:migrate`, kill the proxy.
      #
      # Required IAM on the DEPLOY service account (one-time setup):
      #   roles/cloudsql.client                         (instance-scope)
      #   roles/secretmanager.secretAccessor            (on api-database-url)
      # If missing, this step fails with a clear permission error and
      # the deploy halts; no schema/code drift can result.
      # ---------------------------------------------------------------
      - name: Install pnpm
        # Version comes from package.json's `packageManager` field; setting
        # it here too triggers ERR_PNPM_BAD_PM_VERSION at runtime.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace deps (for migrations runner)
        # --filter is the runner — we only need @xb/api + its workspace deps,
        # not the whole UI tree. Faster cold install.
        run: pnpm install --frozen-lockfile --filter=@xb/api...

      - name: Build workspace deps of @xb/api
        # `tsx` runs migrate.ts directly, but the workspace packages it
        # imports (@xb/config, @xb/types, @xb/auth) are consumed via their
        # `main: dist/...` entry points. dist/ doesn't exist until each
        # package is built. The `^...` filter builds only the dependencies
        # of @xb/api, not @xb/api itself (we run that through tsx).
        run: pnpm --filter @xb/api^... build

      - name: Apply pending DB migrations
        env:
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
        run: |
          set -euo pipefail

          # We read api-database-admin-url here, NOT api-database-url.
          # The runtime user (`xbmatrixapp`) is intentionally least-privileged
          # by migration 0007 — it has no CREATE on schema public, so it
          # cannot run DDL. The admin DSN should resolve to the `postgres`
          # role (or any role that can run migrations); provision it with
          # infrastructure/scripts/setup-migrations-secret.ps1.
          #
          # If the admin secret doesn't exist yet, SKIP migrations rather
          # than blocking the deploy. That preserves the original behavior
          # of the workflow (deploy code without auto-migrate) for as long
          # as the admin DSN hasn't been provisioned. Set up the secret
          # with the helper script — the next deploy will run migrations
          # automatically.
          echo "::group::Check admin DATABASE_URL is provisioned"
          if ! gcloud secrets describe api-database-admin-url \
              --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            echo "::warning::api-database-admin-url secret is not provisioned — skipping migrations."
            echo "::warning::Run infrastructure/scripts/setup-migrations-secret.ps1 to enable auto-migrate."
            echo "MIGRATIONS_SKIPPED=true" >> "$GITHUB_ENV"
            echo "::endgroup::"
            exit 0
          fi
          echo "::endgroup::"

          echo "::group::Fetch admin DATABASE_URL from Secret Manager"
          DB_URL=$(gcloud secrets versions access latest \
            --secret=api-database-admin-url \
            --project="$GCP_PROJECT_ID")
          # Mask the whole URL (it contains the password) — also mask the
          # password component on its own so it doesn't leak if logged
          # separately.
          echo "::add-mask::$DB_URL"
          DB_PASS=$(printf '%s' "$DB_URL" | sed -n 's|^postgresql://[^:]*:\([^@]*\)@.*|\1|p')
          if [ -n "$DB_PASS" ]; then echo "::add-mask::$DB_PASS"; fi
          echo "::endgroup::"

          echo "::group::Parse DSN"
          # Expected shape (Cloud SQL connector form):
          #   postgresql://user:pass@/db?host=/cloudsql/INSTANCE&sslmode=disable
          # Output: postgresql://user:pass@127.0.0.1:5433/db
          USER_PASS=$(printf '%s' "$DB_URL" | sed -n 's|^postgresql://\([^@]*\)@.*|\1|p')
          DB_NAME=$(printf '%s' "$DB_URL" | sed -n 's|.*@/\([^?]*\).*|\1|p')
          if [ -z "$USER_PASS" ] || [ -z "$DB_NAME" ]; then
            echo "::error::Could not parse user/password/db from DATABASE_URL. Expected postgresql://user:pass@/db?host=..."
            exit 1
          fi
          MIGRATION_URL="postgresql://${USER_PASS}@127.0.0.1:5433/${DB_NAME}"
          echo "::add-mask::$MIGRATION_URL"
          echo "Parsed db=$DB_NAME (user + password masked)"
          echo "::endgroup::"

          echo "::group::Start Cloud SQL Auth Proxy"
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy --port 5433 "$CLOUD_SQL_CONNECTION_NAME" \
            > proxy.log 2>&1 &
          PROXY_PID=$!
          # Ensure proxy is killed even if migrate fails.
          trap "echo 'Stopping proxy ($PROXY_PID)'; kill $PROXY_PID 2>/dev/null || true" EXIT

          # Wait up to 30s for the listener to be ready.
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5433) >/dev/null 2>&1; then
              echo "Proxy ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              echo "::error::Cloud SQL Auth Proxy did not become ready within 30s"
              cat proxy.log
              exit 1
            fi
          done
          echo "::endgroup::"

          echo "::group::Run pnpm db:migrate"
          DATABASE_URL="$MIGRATION_URL" \
            pnpm --filter @xb/api db:migrate
          echo "::endgroup::"

      - name: Render Cloud Run service definitions
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          # Unique per workflow run+attempt. Cloud Run skips revision creation
          # when the spec is byte-identical (image + env refs unchanged), so
          # secret-only rotations would not be picked up. Stamping a unique
          # annotation per deploy forces a fresh revision every time.
          DEPLOY_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          ARTIFACT_REGISTRY: ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}
          GCS_UPLOADS_BUCKET: ${{ vars.GCS_UPLOADS_BUCKET }}
          GCS_REPORTS_BUCKET: ${{ vars.GCS_REPORTS_BUCKET }}
          CLOUD_TASKS_QUEUE: ${{ vars.CLOUD_TASKS_QUEUE }}
          CLOUD_TASKS_LOCATION: ${{ vars.CLOUD_TASKS_LOCATION }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
          VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR }}
        run: |
          mkdir -p .rendered
          # Source yamls may have CRLF if they were ever edited on Windows.
          # `tr -d '\r'` strips them; otherwise envsubst's substituted values
          # carry the \r, which the Cloud SQL connector reads as part of the
          # instance name and fails with "Invalid request: instance name".
          envsubst < infrastructure/cloudrun/api.service.yaml    | tr -d '\r' > .rendered/api.service.yaml
          envsubst < infrastructure/cloudrun/worker.service.yaml | tr -d '\r' > .rendered/worker.service.yaml

      - name: Deploy API to Cloud Run
        run: |
          gcloud run services replace .rendered/api.service.yaml \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run services replace .rendered/worker.service.yaml \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Summarize
        run: |
          echo "✓ Deployed xb-api and xb-worker @ ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
