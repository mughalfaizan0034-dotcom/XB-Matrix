name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Em-dash guard
        # Platform-wide ban on em dashes in user-visible strings and
        # code comments (project_design_system memory). Scopes to
        # apps/web/src + apps/api/src/uploads where strings surface
        # to operators. Fails loud rather than let them silently drift
        # back in. Use comma, period, colon, or rewrite instead.
        run: |
          set -e
          MATCHES=$(grep -rn "$(printf '\xe2\x80\x94')" apps/web/src apps/api/src/uploads 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Em dashes are banned platform-wide. Replace with comma, period, colon, or rewrite."
            echo "$MATCHES"
            exit 1
          fi

      - name: Semantic-token guard (no raw orange/amber)
        # Components MUST consume semantic tokens (bg-accent, text-warning,
        # ring-accent, etc.) from packages/ui/tailwind-preset.js — NOT raw
        # `orange-*` or `amber-*` utilities. Catches future regressions
        # before they re-introduce the orange-emphasis era or fragment
        # the warning vocabulary across raw amber. Scoped to component
        # code under apps/web/src + packages/ui/src/components; the
        # tailwind preset and tokens.ts are the only legitimate places
        # the literal color names live.
        run: |
          set -e
          MATCHES=$(grep -rnE '\b(bg|text|border|ring|from|to|via|decoration|fill|stroke|placeholder|outline|shadow|divide|caret)-(orange|amber)(-[0-9]+)?\b' apps/web/src packages/ui/src/components 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Raw orange-* / amber-* utility classes are banned. Use semantic tokens (bg-accent, text-warning, etc.) from tailwind-preset.js."
            echo "$MATCHES"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.com
          NEXT_PUBLIC_APP_NAME: xB Matrix
